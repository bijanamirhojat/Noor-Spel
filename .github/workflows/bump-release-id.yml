name: Bump Release ID

on:
  push:
    branches: [main]

jobs:
  bump-release-id:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump release id in index
        run: bash bump-release-id.sh

      - name: Commit and push release id
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No release id changes"
          else
            git commit -m "chore: bump release id"
            git push
          fi
