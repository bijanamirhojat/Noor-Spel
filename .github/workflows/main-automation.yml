name: Main Automation

on:
  push:
    branches: [main]

concurrency:
  group: main-automation
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect kleurplaten changes
        id: changes
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              before="$(git rev-parse HEAD~1)"
            else
              before="${{ github.sha }}"
            fi
          fi

          if git diff --name-only "$before" "${{ github.sha }}" | grep -E '^kleurplaten/.*\.svg$' >/dev/null 2>&1; then
            echo "kleurplaten_svg_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "kleurplaten_svg_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build kleurplaten index
        if: steps.changes.outputs.kleurplaten_svg_changed == 'true'
        run: bash build-kleurplaten.sh

      - name: Bump release id
        run: bash bump-release-id.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    if: github.actor != 'github-actions[bot]'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
