<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#ff6b6b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Noor's Games">
    <title>Noor's Boerderijtje</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚜</text></svg>">
    <link rel="manifest" href="../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .game-container {
            max-width: 1040px;
            height: calc(100vh - 30px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 14px;
        }

        h1 {
            margin-bottom: 6px;
            font-size: 1.5rem;
        }

        .back-btn {
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 0.78rem;
        }

        .hud {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .pill {
            background: #fff8ef;
            border: 2px solid #ffd8a8;
            color: #9c5f00;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .task {
            margin-bottom: 6px;
            padding: 7px 10px;
            font-size: 0.88rem;
        }

        .farm-scene {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: 26px;
            border: 3px solid #86efac;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 18%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 18%),
                linear-gradient(180deg, #93c5fd 0%, #bfdbfe 30%, #86efac 31%, #65a30d 100%);
        }

        .sun {
            position: absolute;
            top: 20px;
            right: 26px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff7cc 0%, #fde047 55%, #facc15 100%);
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.4);
        }

        .cloud {
            position: absolute;
            color: rgba(255,255,255,0.85);
            font-size: 2rem;
        }

        .cloud.one { top: 28px; left: 10%; }
        .cloud.two { top: 56px; left: 36%; }

        .barn {
            position: absolute;
            right: 7%;
            top: 18%;
            width: 120px;
            height: 126px;
        }

        .barn-roof {
            width: 0;
            height: 0;
            margin: 0 auto;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 42px solid #b91c1c;
        }

        .barn-body {
            width: 104px;
            height: 82px;
            margin: 0 auto;
            border-radius: 16px 16px 12px 12px;
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
            position: relative;
            box-shadow: 0 10px 18px rgba(0,0,0,0.18);
        }

        .barn-door {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 42px;
            border-radius: 10px 10px 0 0;
            background: #7c2d12;
        }

        .basket {
            position: absolute;
            right: 8%;
            bottom: 12%;
            width: 110px;
            height: 92px;
            border-radius: 18px;
            background: linear-gradient(180deg, #d4a373 0%, #b77943 100%);
            box-shadow: 0 8px 16px rgba(0,0,0,0.18);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
        }

        .basket::before {
            content: '';
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 58px;
            height: 26px;
            border: 5px solid #8b5e34;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
        }

        .basket-items {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            width: 78px;
            min-height: 28px;
            font-size: 1.2rem;
        }

        .plot-area {
            position: absolute;
            left: 8%;
            bottom: 16%;
            width: 56%;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px 24px;
        }

        .plot {
            position: relative;
            height: 88px;
            border-radius: 28px;
            background: linear-gradient(180deg, #8b5a2b 0%, #6f451f 100%);
            border: 4px solid #5b3717;
            box-shadow: inset 0 8px 10px rgba(255,255,255,0.08), 0 8px 14px rgba(0,0,0,0.16);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .plot:hover,
        .coop:hover,
        .egg:hover {
            transform: scale(1.03);
        }

        .plot.wrong {
            animation: plotShake 0.35s ease-in-out;
        }

        .plot-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 2rem;
        }

        .plot-water {
            position: absolute;
            inset: 10px;
            border-radius: 22px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.3) 0%, rgba(96, 165, 250, 0) 75%);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .plot.watered .plot-water,
        .plot.ready .plot-water {
            opacity: 1;
        }

        .plot.sparkle::after {
            content: '✨';
            position: absolute;
            top: -8px;
            right: 10px;
            font-size: 1rem;
        }

        .coop {
            position: absolute;
            right: 23%;
            bottom: 16%;
            width: 120px;
            height: 112px;
            border-radius: 18px;
            background: linear-gradient(180deg, #fde68a 0%, #fcd34d 100%);
            border: 4px solid #d97706;
            box-shadow: 0 10px 18px rgba(0,0,0,0.16);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.18s ease;
        }

        .coop.chicken-fed {
            box-shadow: 0 0 0 5px rgba(251, 191, 36, 0.25), 0 10px 18px rgba(0,0,0,0.16);
        }

        .coop-emoji {
            font-size: 2.6rem;
        }

        .coop-heart {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .coop.chicken-fed .coop-heart {
            opacity: 1;
        }

        .egg {
            position: absolute;
            right: 17%;
            bottom: 18%;
            width: 48px;
            height: 58px;
            border-radius: 50% 50% 46% 46%;
            border: 3px solid #d4b08c;
            background: linear-gradient(180deg, #fffef2 0%, #f5e6c8 100%);
            box-shadow: 0 8px 16px rgba(0,0,0,0.14);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .egg.visible {
            display: flex;
        }

        .flying-item {
            position: absolute;
            font-size: 1.8rem;
            z-index: 5;
            pointer-events: none;
            transition: transform 0.75s ease, opacity 0.75s ease;
        }

        .tools-panel {
            margin-top: 8px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .tool-btn-farm {
            min-height: 66px;
            border: 3px solid #d9d9d9;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: #7c4a00;
        }

        .tool-btn-farm .tool-emoji {
            font-size: 1.6rem;
            line-height: 1;
        }

        .tool-btn-farm .tool-label {
            font-size: 0.78rem;
            line-height: 1;
        }

        .tool-btn-farm.selected {
            border-color: #16a34a;
            background: #ecfdf5;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.18);
            transform: scale(1.03);
        }

        .message {
            margin-top: 8px;
            margin-bottom: 0;
            min-height: 20px;
            padding: 7px 10px;
            font-size: 0.88rem;
        }

        @keyframes plotShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-3px); }
        }

        @media (min-width: 768px) {
            .game-container {
                max-height: 760px;
                padding: 18px;
            }

            h1 {
                font-size: 1.95rem;
                margin-bottom: 8px;
            }

            .back-btn {
                font-size: 0.95rem;
                padding: 9px 16px;
            }

            .task,
            .message,
            .pill {
                font-size: 1rem;
            }

            .plot {
                height: 108px;
            }

            .plot-content {
                font-size: 2.4rem;
            }

            .coop {
                width: 138px;
                height: 128px;
            }

            .coop-emoji {
                font-size: 3rem;
            }

            .basket {
                width: 124px;
                height: 98px;
            }

            .tool-btn-farm {
                min-height: 86px;
            }

            .tool-btn-farm .tool-emoji {
                font-size: 2rem;
            }

            .tool-btn-farm .tool-label {
                font-size: 0.92rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <a href="../index.html" class="back-btn">🏠 Terug</a>
        <h1>🚜 Noor's Boerderijtje</h1>

        <div class="hud">
            <div class="pill" id="dayPill">Dag 1/5</div>
            <div class="pill" id="basketPill">Mand 0/3</div>
            <div class="pill" id="starsPill">Sterren: 0</div>
        </div>

        <div class="task" id="task">Kies een tool en help op de boerderij.</div>

        <div class="farm-scene" id="farmScene">
            <div class="sun"></div>
            <div class="cloud one">☁️</div>
            <div class="cloud two">☁️</div>

            <div class="barn">
                <div class="barn-roof"></div>
                <div class="barn-body">
                    <div class="barn-door"></div>
                </div>
            </div>

            <div class="plot-area" id="plotArea"></div>

            <div class="coop" id="coop" aria-label="Kippenhok">
                <div class="coop-heart">💛</div>
                <div class="coop-emoji">🐔</div>
                <div style="font-size:0.9rem; font-weight:700; color:#8b4a00;">Kippenhok</div>
            </div>

            <button class="egg" id="egg" type="button" aria-label="Ei rapen">🥚</button>

            <div class="basket">
                <div class="basket-items" id="basketItems"></div>
            </div>
        </div>

        <div class="tools-panel" id="toolsPanel"></div>

        <div class="message" id="message">Kies een tool en tik op de juiste plek.</div>
    </div>

    <script src="shared.js"></script>
    <script>
        const STORAGE_KEY = 'noor-boerderij-progress';
        const tools = [
            { id: 'seed', emoji: '🌱', label: 'Zaaien' },
            { id: 'water', emoji: '💧', label: 'Water' },
            { id: 'harvest', emoji: '🧺', label: 'Oogsten' },
            { id: 'feed', emoji: '🍽️', label: 'Voer' }
        ];

        const days = [
            {
                cropTypes: ['🥕', '🍓'],
                plots: [
                    { crop: '🥕', waterNeeded: 1 },
                    { crop: '🍓', waterNeeded: 1 }
                ],
                eggs: 1
            },
            {
                cropTypes: ['🥕', '🍓', '🌽'],
                plots: [
                    { crop: '🥕', waterNeeded: 1 },
                    { crop: '🍓', waterNeeded: 1 },
                    { crop: '🌽', waterNeeded: 1 }
                ],
                eggs: 1
            },
            {
                cropTypes: ['🥕', '🍓', '🎃'],
                plots: [
                    { crop: '🥕', waterNeeded: 2 },
                    { crop: '🍓', waterNeeded: 1 },
                    { crop: '🎃', waterNeeded: 2 }
                ],
                eggs: 1
            },
            {
                cropTypes: ['🥕', '🌽', '🎃'],
                plots: [
                    { crop: '🥕', waterNeeded: 1 },
                    { crop: '🌽', waterNeeded: 2 },
                    { crop: '🎃', waterNeeded: 1 }
                ],
                eggs: 2
            },
            {
                cropTypes: ['🍓', '🌽', '🎃'],
                plots: [
                    { crop: '🍓', waterNeeded: 2 },
                    { crop: '🌽', waterNeeded: 2 },
                    { crop: '🎃', waterNeeded: 2 },
                    { crop: '🥕', waterNeeded: 1 }
                ],
                eggs: 2
            }
        ];

        let currentDay = 0;
        let stars = 0;
        let selectedTool = 'seed';
        let plots = [];
        let basketItems = [];
        let chickenFed = false;
        let eggsRemaining = 0;
        let roundLocked = false;

        const dayPill = document.getElementById('dayPill');
        const basketPill = document.getElementById('basketPill');
        const starsPill = document.getElementById('starsPill');
        const task = document.getElementById('task');
        const message = document.getElementById('message');
        const plotArea = document.getElementById('plotArea');
        const toolsPanel = document.getElementById('toolsPanel');
        const coop = document.getElementById('coop');
        const egg = document.getElementById('egg');
        const basketItemsEl = document.getElementById('basketItems');
        const farmScene = document.getElementById('farmScene');

        function loadProgress() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const saved = JSON.parse(raw);
                if (typeof saved.currentDay === 'number') currentDay = Math.max(0, Math.min(days.length - 1, saved.currentDay));
                if (typeof saved.stars === 'number') stars = Math.max(0, saved.stars);
            } catch (_) {}
        }

        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentDay, stars }));
            } catch (_) {}
        }

        function updateHud() {
            const day = days[currentDay];
            dayPill.textContent = `Dag ${currentDay + 1}/${days.length}`;
            basketPill.textContent = `Mand ${basketItems.length}/${day.plots.length + day.eggs}`;
            starsPill.textContent = `Sterren: ${stars}`;
        }

        function renderTools() {
            toolsPanel.innerHTML = '';
            tools.forEach((tool) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'tool-btn-farm' + (selectedTool === tool.id ? ' selected' : '');
                btn.innerHTML = `<span class="tool-emoji">${tool.emoji}</span><span class="tool-label">${tool.label}</span>`;
                btn.addEventListener('click', () => {
                    if (roundLocked) return;
                    selectedTool = tool.id;
                    playPop();
                    renderTools();
                    message.textContent = `Gekozen: ${tool.label}.`;
                });
                toolsPanel.appendChild(btn);
            });
        }

        function plotStateContent(plot) {
            if (plot.state === 'empty') return '🟤';
            if (plot.state === 'seeded') return '🌱';
            if (plot.state === 'growing') return plot.crop === '🎃' ? '🌿' : '🌱';
            if (plot.state === 'ready') return plot.crop;
            return '🟤';
        }

        function renderPlots() {
            plotArea.innerHTML = '';
            plots.forEach((plot, index) => {
                const plotEl = document.createElement('button');
                plotEl.type = 'button';
                plotEl.className = 'plot';
                if (plot.waterCount > 0) plotEl.classList.add('watered');
                if (plot.state === 'ready') plotEl.classList.add('ready', 'sparkle');

                plotEl.innerHTML = `<span class="plot-water"></span><span class="plot-content">${plotStateContent(plot)}</span>`;

                plotEl.addEventListener('click', () => handlePlot(index, plotEl));
                plotArea.appendChild(plotEl);
            });
        }

        function renderBasket() {
            basketItemsEl.innerHTML = '';
            basketItems.forEach((item) => {
                const span = document.createElement('span');
                span.textContent = item;
                basketItemsEl.appendChild(span);
            });
            updateHud();
        }

        function renderChicken() {
            coop.classList.toggle('chicken-fed', chickenFed);
            egg.classList.toggle('visible', eggsRemaining > 0);
        }

        function animateToBasket(emoji, sourceEl, onDone) {
            const flying = document.createElement('div');
            flying.className = 'flying-item';
            flying.textContent = emoji;

            const sourceRect = sourceEl.getBoundingClientRect();
            const basketRect = basketItemsEl.getBoundingClientRect();
            const sceneRect = farmScene.getBoundingClientRect();

            flying.style.left = `${sourceRect.left - sceneRect.left + sourceRect.width / 2 - 12}px`;
            flying.style.top = `${sourceRect.top - sceneRect.top + sourceRect.height / 2 - 12}px`;

            farmScene.appendChild(flying);

            requestAnimationFrame(() => {
                flying.style.transform = `translate(${basketRect.left - sourceRect.left}px, ${basketRect.top - sourceRect.top}px) scale(0.6)`;
                flying.style.opacity = '0.2';
            });

            setTimeout(() => {
                flying.remove();
                onDone();
            }, 760);
        }

        function shakeElement(el) {
            el.classList.add('wrong');
            setTimeout(() => el.classList.remove('wrong'), 380);
        }

        function handlePlot(index, plotEl) {
            if (roundLocked) return;

            const plot = plots[index];

            if (selectedTool === 'seed') {
                if (plot.state !== 'empty') {
                    playWrong();
                    shakeElement(plotEl);
                    message.textContent = 'Hier staat al iets. Kies een ander vak.';
                    return;
                }

                plot.state = 'seeded';
                plot.waterCount = 0;
                playPop();
                message.textContent = 'Zaadje geplant! Geef nu water.';
            } else if (selectedTool === 'water') {
                if (plot.state === 'empty') {
                    playWrong();
                    shakeElement(plotEl);
                    message.textContent = 'Eerst zaaien, dan water geven.';
                    return;
                }

                if (plot.state === 'ready' || plot.state === 'done') {
                    playWrong();
                    shakeElement(plotEl);
                    message.textContent = 'Deze plant heeft nu geen water nodig.';
                    return;
                }

                plot.waterCount += 1;
                plot.state = plot.waterCount >= plot.waterNeeded ? 'ready' : 'growing';
                playPop();
                message.textContent = plot.state === 'ready' ? 'Deze is klaar om te oogsten!' : 'Goed zo, nog wat groeien...';
            } else if (selectedTool === 'harvest') {
                if (plot.state !== 'ready') {
                    playWrong();
                    shakeElement(plotEl);
                    message.textContent = 'Deze plant is nog niet klaar om te oogsten.';
                    return;
                }

                const crop = plot.crop;
                plot.state = 'done';
                playCorrect();
                message.textContent = `Geoogst: ${crop}`;
                animateToBasket(crop, plotEl, () => {
                    basketItems.push(crop);
                    renderBasket();
                    checkDayComplete();
                });
            } else {
                playWrong();
                shakeElement(plotEl);
                message.textContent = 'Met deze tool help je de kip, niet de akker.';
                return;
            }

            renderPlots();
        }

        function handleCoop() {
            if (roundLocked) return;

            if (selectedTool !== 'feed') {
                playWrong();
                message.textContent = 'Gebruik de voerknop bij de kip.';
                return;
            }

            if (chickenFed && eggsRemaining > 0) {
                playWrong();
                message.textContent = 'De kip heeft al voer gehad. Kijk voor een ei!';
                return;
            }

            if (chickenFed && eggsRemaining === 0) {
                playWrong();
                message.textContent = 'De kip is al klaar voor vandaag.';
                return;
            }

            chickenFed = true;
            eggsRemaining = days[currentDay].eggs;
            playCorrect();
            message.textContent = eggsRemaining > 1 ? 'De kip is blij! Er liggen eieren klaar.' : 'De kip is blij! Kijk, een ei!';
            renderChicken();
        }

        function handleEgg() {
            if (roundLocked || eggsRemaining <= 0) return;

            if (selectedTool !== 'harvest') {
                playWrong();
                message.textContent = 'Gebruik de oogstmand om het ei te rapen.';
                return;
            }

            playCorrect();
            message.textContent = 'Ei geraapt!';
            eggsRemaining -= 1;
            animateToBasket('🥚', egg, () => {
                basketItems.push('🥚');
                renderBasket();
                renderChicken();
                checkDayComplete();
            });

            renderChicken();
        }

        function checkDayComplete() {
            const allHarvested = plots.every((plot) => plot.state === 'done');
            if (!allHarvested || eggsRemaining > 0) {
                return;
            }

            roundLocked = true;
            stars += 1;
            saveProgress();
            updateHud();
            playWin();
            message.textContent = 'Alles klaar! De boerderij is blij! ⭐';

            setTimeout(() => {
                currentDay = (currentDay + 1) % days.length;
                saveProgress();
                loadDay();
            }, 1700);
        }

        function createDayState(day) {
            return day.plots.map((plot) => ({
                crop: plot.crop,
                waterNeeded: plot.waterNeeded,
                waterCount: 0,
                state: 'empty'
            }));
        }

        function loadDay() {
            roundLocked = false;
            selectedTool = 'seed';
            const day = days[currentDay];
            plots = createDayState(day);
            basketItems = [];
            chickenFed = false;
            eggsRemaining = 0;

            task.textContent = `Dag ${currentDay + 1}: plant, geef water, oogst en help de kip.`;
            message.textContent = 'Kies een tool en tik op de juiste plek.';

            renderTools();
            renderPlots();
            renderChicken();
            renderBasket();
            updateHud();
        }

        coop.addEventListener('click', handleCoop);
        egg.addEventListener('click', handleEgg);

        loadProgress();
        loadDay();
    </script>
</body>
</html>
