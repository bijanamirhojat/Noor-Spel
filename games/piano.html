<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#ff6b6b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Noor's Games">
    <title>Piano</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎹</text></svg>">
    <link rel="manifest" href="../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        .game-container { max-width: 520px; }
        .piano { 
            display: flex; 
            justify-content: center; 
            align-items: center;
            margin-bottom: 16px; 
            height: 280px;
            overflow-x: auto;
            padding: 8px 8px 16px;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.08) 100%);
            touch-action: none;
            -webkit-overflow-scrolling: touch;
        }
        .keys-container { position: relative; display: flex; min-width: max-content; }
        .white-key { 
            width: 56px; height: 240px; 
            background: linear-gradient(180deg, #fff 0%, #f5f5f5 100%); 
            border: 1px solid #bbb; border-radius: 0 0 4px 4px; 
            cursor: pointer; transition: all 0.1s; 
            display: flex; align-items: flex-end; justify-content: center; 
            padding-bottom: 12px; font-family: 'Fredoka One', cursive; 
            font-size: 0.9rem; color: #888; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 1; 
            touch-action: none;
        }
        .white-key:hover { background: #fff; }
        .white-key:active, .white-key.playing { background: #ff6b6b; color: white; transform: translateY(2px); }
        .black-key { 
            position: absolute; width: 34px; height: 145px; 
            background: linear-gradient(180deg, #222 0%, #000 100%); 
            border-radius: 0 0 3px 3px; cursor: pointer; 
            transition: all 0.1s; z-index: 2; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.4); top: 0;
            touch-action: none;
        }
        .black-key:hover { background: #333; }
        .black-key:active, .black-key.playing { background: #ff6b6b; transform: translateY(2px); }
        .mode-select { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .mode-btn { padding: 10px 20px; border: none; border-radius: 20px; font-family: 'Fredoka One', cursive; font-size: 0.9rem; cursor: pointer; background: #f0f0f0; color: #666; transition: all 0.2s; }
        .mode-btn.active { background: #ff6b6b; color: white; }
        .songs { background: #f5f5f5; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .songs h3 { font-family: 'Fredoka One', cursive; color: #444; margin-bottom: 10px; font-size: 1rem; }
        .song-btn { display: block; width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 15px; font-family: 'Nunito', sans-serif; font-size: 1rem; cursor: pointer; background: white; color: #444; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .song-btn:hover { background: #ff9a8b; color: white; }
        .song-btn.playing { background: #4CAF50; color: white; }
        .notes-display { min-height: 44px; display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .note-badge { background: #ff9a8b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; animation: popIn 0.2s ease; }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .instructions { font-size: 0.9rem; color: #888; }
        @media (min-width: 768px) {
            .game-container { max-width: 860px; }
            .piano { height: 330px; }
            .white-key { width: 66px; height: 290px; font-size: 1rem; }
            .black-key { width: 40px; height: 175px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <a href="../index.html" class="back-btn">🏠 Terug</a>
        <h1>🎹 Piano</h1>
        <div class="notes-display" id="notesDisplay"></div>
        <div class="piano" id="piano">
            <div class="keys-container">
                <div class="white-key" data-note="C">C</div>
                <div class="white-key" data-note="D">D</div>
                <div class="white-key" data-note="E">E</div>
                <div class="white-key" data-note="F">F</div>
                <div class="white-key" data-note="G">G</div>
                <div class="white-key" data-note="A">A</div>
                <div class="white-key" data-note="B">B</div>
                <div class="white-key" data-note="C2">C</div>
                
                <div class="black-key" style="left: 39px;" data-note="Cs"></div>
                <div class="black-key" style="left: 95px;" data-note="Ds"></div>
                <div class="black-key" style="left: 207px;" data-note="Fs"></div>
                <div class="black-key" style="left: 263px;" data-note="Gs"></div>
                <div class="black-key" style="left: 319px;" data-note="As"></div>
            </div>
        </div>
        <div class="songs">
            <h3>🎵 Leer liedjes</h3>
            <button class="song-btn" onclick="playSong('twinkle', this)">⭐ Twinkle Twinkle Little Star</button>
            <button class="song-btn" onclick="playSong('birthday', this)">🎂 Verjaardagslied</button>
            <button class="song-btn" onclick="playSong('mary', this)">🐑 Mary Had a Little Lamb</button>
        </div>
        <p class="instructions">Tik of veeg over de toetsen om te spelen!</p>
    </div>

    <script src="shared.js"></script>
    <script>
        const notes = {
            'C': 261.63, 'Cs': 277.18, 'D': 293.66, 'Ds': 311.13,
            'E': 329.63, 'F': 349.23, 'Fs': 369.99, 'G': 392.00,
            'Gs': 415.30, 'A': 440.00, 'As': 466.16, 'B': 493.88,
            'C2': 523.25
        };

        const noteNames = {
            'C': 'Do', 'Cs': 'Do#', 'D': 'Re', 'Ds': 'Re#',
            'E': 'Mi', 'F': 'Fa', 'Fs': 'Fa#', 'G': 'Sol',
            'Gs': 'Sol#', 'A': 'La', 'As': 'La#', 'B': 'Ti', 'C2': 'Do'
        };

        const songs = {
            'twinkle': ['C', 'C', 'G', 'G', 'A', 'A', 'G', 'F', 'F', 'E', 'E', 'D', 'D', 'C'],
            'birthday': ['C', 'C', 'D', 'C', 'F', 'E', 'C', 'C', 'D', 'C', 'G', 'F'],
            'mary': ['E', 'D', 'C', 'D', 'E', 'E', 'E', 'D', 'D', 'D', 'E', 'G', 'G']
        };

        let isPlaying = false;
        let isPointerDown = false;
        let lastDraggedNote = null;
        let lastDragTime = 0;

        function playSound(freq) {
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.4, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }

        function playNote(note) {
            const key = document.querySelector(`[data-note="${note}"]`);
            if (key) {
                key.classList.add('playing');
                setTimeout(() => key.classList.remove('playing'), 200);
            }
            
            playSound(notes[note]);
            showNote(note);
        }

        function showNote(note) {
            const display = document.getElementById('notesDisplay');
            const badge = document.createElement('span');
            badge.className = 'note-badge';
            badge.textContent = noteNames[note];
            display.appendChild(badge);
            
            setTimeout(() => {
                if (display.contains(badge)) {
                    display.removeChild(badge);
                }
            }, 1500);
        }

        async function playSong(songName, buttonEl) {
            if (isPlaying) return;
            
            const song = songs[songName];
            const buttons = document.querySelectorAll('.song-btn');
            buttons.forEach(btn => btn.classList.remove('playing'));
            
            isPlaying = true;
            if (buttonEl) buttonEl.classList.add('playing');
            
            for (let i = 0; i < song.length; i++) {
                playNote(song[i]);
                await new Promise(resolve => setTimeout(resolve, 400));
            }
            
            isPlaying = false;
            if (buttonEl) buttonEl.classList.remove('playing');
        }

        function keyFromPoint(x, y) {
            const el = document.elementFromPoint(x, y);
            if (!el) return null;
            return el.closest('.white-key, .black-key');
        }

        function playDraggedNote(x, y) {
            const key = keyFromPoint(x, y);
            if (!key) return;
            const note = key.dataset.note;
            if (!note) return;

            const now = performance.now();
            if (note === lastDraggedNote && now - lastDragTime < 80) return;

            lastDraggedNote = note;
            lastDragTime = now;
            playNote(note);
        }

        function positionBlackKeys() {
            const whiteKeys = document.querySelectorAll('.white-key');
            const blackKeys = {
                Cs: [0, 1],
                Ds: [1, 2],
                Fs: [3, 4],
                Gs: [4, 5],
                As: [5, 6]
            };

            Object.entries(blackKeys).forEach(([note, pair]) => {
                const key = document.querySelector(`.black-key[data-note="${note}"]`);
                if (!key) return;
                const leftWhite = whiteKeys[pair[0]];
                const rightWhite = whiteKeys[pair[1]];
                if (!leftWhite || !rightWhite) return;
                const center = (leftWhite.offsetLeft + rightWhite.offsetLeft) / 2 + leftWhite.offsetWidth / 2;
                key.style.left = (center - key.offsetWidth / 2) + 'px';
            });
        }

        const piano = document.getElementById('piano');

        piano.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            isPointerDown = true;
            lastDraggedNote = null;
            if (piano.setPointerCapture) piano.setPointerCapture(e.pointerId);
            e.preventDefault();
            playDraggedNote(e.clientX, e.clientY);
        });

        piano.addEventListener('pointermove', (e) => {
            if (!isPointerDown) return;
            e.preventDefault();
            playDraggedNote(e.clientX, e.clientY);
        });

        function endPointer(e) {
            isPointerDown = false;
            lastDraggedNote = null;
            if (e && piano.releasePointerCapture && piano.hasPointerCapture && piano.hasPointerCapture(e.pointerId)) {
                piano.releasePointerCapture(e.pointerId);
            }
        }

        piano.addEventListener('pointerup', endPointer);
        piano.addEventListener('pointercancel', endPointer);

        window.addEventListener('resize', positionBlackKeys);
        positionBlackKeys();
    </script>
</body>
</html>
